<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Chain Digital Twin | GEM Platform</title>
    <link href="vendor/css/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="vendor/css/leaflet.css">
    <script src="vendor/js/leaflet.js"></script>
    <script src="vendor/js/lucide.js"></script>
    <style>
        :root {
            --bg-base: #020617;
            --bg-panel: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body { font-family: var(--font-sans); background: var(--bg-base); color: var(--text-main); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        
        .topbar {
            padding: 16px 32px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 6, 23, 0.9); border-bottom: 1px solid var(--border); z-index: 1000;
        }

        .brand h1 { font-size: 1.5rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 10px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; transition: all 0.3s; }
        .nav-links a:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }

        #map { flex: 1; width: 100%; background: #0f172a; z-index: 1; }

        .leaflet-container { background: #0f172a !important; }

        /* Custom pulsing marker */
        .pulse-marker {
            width: 15px; height: 15px; border-radius: 50%;
            background: var(--accent-primary);
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            animation: map-pulse 2s infinite;
        }

        .pulse-marker.truck { background: var(--accent-green); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); animation: truck-pulse 2s infinite; }

        @keyframes map-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        @keyframes truck-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .overlay-panel {
            position: absolute; top: 90px; right: 30px; z-index: 1000;
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; backdrop-filter: blur(20px);
            width: 300px;
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;}
        .stat-label { color: var(--text-muted); font-size: 0.8rem; font-weight: 600; }
        .stat-val { font-family: var(--font-mono); font-weight: 700; color: #fff; }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="brand">
            <i data-lucide="globe" style="color: var(--accent-primary);"></i>
            <h1>Supply Chain Digital Twin</h1>
        </div>
        <div class="nav-links">
            <a href="command_center.html">Command Center</a>
        </div>
    </div>

    <div style="position: relative; flex: 1; display: flex;">
        <div id="map"></div>
        
        <div class="overlay-panel">
            <h3 style="margin-bottom: 20px; font-size: 1rem; color: #fff; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="activity"></i> Live Telemetry
            </h3>
            <div class="stat-row">
                <span class="stat-label">Active Trucks</span>
                <span class="stat-val" id="val-trucks">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Vendor Nodes</span>
                <span class="stat-val" id="val-vendors">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Weather Delays</span>
                <span class="stat-val" style="color: var(--accent-red);">0 Detected</span>
            </div>
            <div style="margin-top: 20px; font-size: 0.75rem; color: var(--text-muted); line-height: 1.5;">
                Real-time tracking of in-transit goods and registered vendor headquarters using IoT simulation.
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        lucide.createIcons();

        // Initialize Dark Map (CartoDB Dark Matter)
        const map = L.map('map', { zoomControl: false }).setView([22.5937, 78.9629], 5); // Center on India
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        async function loadNodes() {
            try {
                const nodes = await ApiClient.request('/c3/iot-nodes');
                
                let trucks = 0; let vendors = 0;

                nodes.forEach(node => {
                    const isTruck = node.type === 'Delivery Truck';
                    if(isTruck) trucks++; else vendors++;

                    const icon = L.divIcon({
                        className: `pulse-marker ${isTruck ? 'truck' : ''}`,
                        iconSize: [15, 15]
                    });

                    L.marker([node.lat, node.lng], {icon: icon})
                     .bindPopup(`<b>${node.id}</b><br>${node.type}<br>Status: ${node.status}`)
                     .addTo(map);
                });

                document.getElementById('val-trucks').textContent = trucks;
                document.getElementById('val-vendors').textContent = vendors;

            } catch (error) {
                console.error("Map Load Error", error);
            }
        }

        window.onload = loadNodes;
    </script>
</body>
</html>
