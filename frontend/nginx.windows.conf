# ==============================================================================
#  GEM Tender Intelligence System — Native Windows Nginx Server Configuration
# ==============================================================================

server {
    listen 80;
    server_name localhost;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=()" always;

    # ── Static Frontend ──────────────────────────────────────────────────────
    # EDIT THIS PATH: Point it to your actual front-end directory
    root "F:/teneder evolution/tender/frontend";
    index dashboard.html index.html;

    location / {
        try_files $uri $uri/ /dashboard.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── API Proxy → FastAPI Backend (Running on Port 8000) ───────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    # ── Direct backend routes (no /api prefix) ───────────────────────────────
    location ~ ^/(tenders|vendors|bids|reports|evaluation|documents|ai-ops|auth|health|ws) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # ── SSE (Server-Sent Events) — disable buffering ────────────────────────
    location ~* /anomaly-stream|/swarm-stream|/stream {
        proxy_pass         http://127.0.0.1:8000;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   X-Accel-Buffering no;
        proxy_read_timeout 3600s;
    }

    # ── WebSocket support ────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_read_timeout 86400s;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1000;
    gzip_comp_level 6;
}
