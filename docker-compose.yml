version: '3.8'

# ============================================================
#  GEM Tender Intelligence System — Production Docker Stack
#  Services: FastAPI · Nginx · MongoDB · Redis · Ollama
#
#  LOCAL DEV:    docker compose up
#  PRODUCTION:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ─────────────────────────────────────────────────────────
  # OLLAMA — Local LLM Engine (replaces cloud APIs)
  # ─────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: gem_ollama
    ports:
      - "11434:11434"
    volumes:
      - gem_ollama_models:/root/.ollama    # Persist downloaded models
    environment:
      - OLLAMA_KEEP_ALIVE=24h              # Keep model loaded in RAM
      - OLLAMA_NUM_PARALLEL=2             # Allow 2 concurrent requests
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # GPU support (requires nvidia-container-toolkit on host or Docker Desktop WSL2)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ─────────────────────────────────────────────────────────
  # OLLAMA INIT — Pull the AI model on first start
  # ─────────────────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: gem_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - gem_ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Pulling LLM model: llama3.1:8b (advanced, standard)...';
        ollama pull llama3.1:8b;
        echo 'Model ready.';
      "
    restart: "no"   # Only runs once on startup

  # ─────────────────────────────────────────────────────────
  # REDIS — LLM Cache + Rate Limiting + Token Blacklist
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: gem_redis
    ports:
      - "6379:6379"
    volumes:
      - gem_redis_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASS:-GemRedis@2024Secure}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-GemRedis@2024Secure}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # MONGODB — Document Store (Audit Logs, RAG Metadata)
  # ─────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: gem_mongodb
    ports:
      - "27017:27017"
    volumes:
      - gem_mongo_data:/data/db
      - gem_mongo_config:/data/configdb
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-gemadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-GemMongo@2024Secure}
      MONGO_INITDB_DATABASE: gem_tender
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: ["mongod", "--auth", "--bind_ip_all"]

  # ─────────────────────────────────────────────────────────
  # QDRANT — Vector Database for RAG Semantic Embeddings
  # ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: gem_qdrant
    ports:
      - "6333:6333"
    volumes:
      - gem_qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # BACKEND — FastAPI + AI Engine
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: gem_backend:latest
    container_name: gem_backend
    ports:
      - "8000:8000"
    volumes:
      - gem_uploads:/app/uploads
      - gem_rag:/app/rag_index
      - gem_contracts:/app/contracts
      - gem_llm_cache:/app/llm_cache
      - gem_sqlite:/app/data           # SQLite database persistence
      - gem_huggingface_cache:/home/gemuser/.cache/huggingface
    environment:
      # ── LLM Configuration ────────────────────────────────
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - LLM_PROVIDER=ollama
      - STRICT_OPEN_SOURCE=true
      # ── Database ─────────────────────────────────────────
      - MONGO_URL=mongodb://${MONGO_USER:-gemadmin}:${MONGO_PASS:-GemMongo@2024Secure}@mongodb:27017/gem_tender?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASS:-GemRedis@2024Secure}@redis:6379/0
      - DATABASE_URL=sqlite:////app/data/gem.db
      - RAG_VECTOR_DB=qdrant
      - QDRANT_URL=http://qdrant:6333
      # ── Security ─────────────────────────────────────────
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE_ME_BEFORE_PRODUCTION_MIN_32_CHARS}
      - AUTH_BYPASS_ENABLED=${AUTH_BYPASS_ENABLED:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      # ── Feature Flags ────────────────────────────────────
      - ENABLE_DOCS=${ENABLE_DOCS:-true}
      - STRICT_ACCURACY=true
      - RAG_MIN_RELEVANCE=40.0
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────────────────
  # FRONTEND — Nginx Static + API Reverse Proxy
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gem_frontend:latest
    container_name: gem_frontend
    ports:
      - "80:80"
      - "443:443"     # SSL ready (add cert volume in prod)
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

# ─────────────────────────────────────────────────────────────
# NAMED VOLUMES — Data Persistence
# ─────────────────────────────────────────────────────────────
volumes:
  gem_ollama_models:    # Ollama LLM model weights (~4GB for Mistral)
    driver: local
  gem_mongo_data:       # MongoDB procurement data
    driver: local
  gem_mongo_config:     # MongoDB config
    driver: local
  gem_redis_data:       # Redis LLM cache + sessions
    driver: local
  gem_uploads:          # Uploaded PDF/vendor documents
    driver: local
  gem_rag:              # RAG vector index
    driver: local
  gem_contracts:        # Generated procurement contracts
    driver: local
  gem_llm_cache:        # File-based LLM response cache
    driver: local
  gem_sqlite:           # SQLite database file
    driver: local
  gem_qdrant_storage:   # Qdrant vector store data persistence
    driver: local
  gem_huggingface_cache: # Cached HuggingFace/SentenceTransformers models
    driver: local
